[tox]
envlist = py{310,311,312,313}-{min,all}

[testenv]
description = Run tests with pytest
dependency_groups = test
extras = all
commands =
    pytest {posargs:tests/}

[testenv:coverage]
description = Run tests with coverage report
dependency_groups = test
extras = all
commands =
    pytest --cov=fieldz_kb --cov-report=term --cov-report=html {posargs:tests/}
